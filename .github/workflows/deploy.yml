name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Also run after the monthly update commits data
  workflow_run:
    workflows: ["Monthly Data Update"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate static API datasets
        env:
          SKIP_GITHUB_ENRICHMENT: "true"
        run: |
          # Only regenerate static outputs from existing seed; no GitHub API calls during build
          npx tsx scripts/generate-datasets.ts || true
          npx tsx scripts/generate-search-index.ts || true

      - name: Validate data
        run: npm run validate:data

      - name: Type check
        run: npm run check

      - name: Build Astro
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
