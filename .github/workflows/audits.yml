name: Accessibility and Quality Audits

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  accessibility:
    name: Axe and Pa11y
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build site
        env:
          SKIP_GITHUB_ENRICHMENT: "true"
        run: npm run build

      - name: Run axe-core and pa11y
        run: npx start-server-and-test "npm run preview -- --host 127.0.0.1 --port 4321" http://127.0.0.1:4321 "npm run audit:axe && npm run audit:pa11y"

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          SKIP_GITHUB_ENRICHMENT: "true"
        run: npm run build

      - name: Run Lighthouse CI
        run: npx start-server-and-test "npm run preview -- --host 127.0.0.1 --port 4321" http://127.0.0.1:4321 "npm run audit:lighthouse"

  links:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          SKIP_GITHUB_ENRICHMENT: "true"
        run: npm run build

      - name: Run local link check
        run: npx start-server-and-test "npm run preview -- --host 127.0.0.1 --port 4321" http://127.0.0.1:4321 "npm run audit:links"
