name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, type-check, test, validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Validate seed dataset
        run: npm run validate:data

      - name: Build (smoke test)
        run: npm run build
        env:
          NODE_ENV: production
          # Skip heavy enrichment in CI; just build from seed
          SKIP_GITHUB_ENRICHMENT: "true"
