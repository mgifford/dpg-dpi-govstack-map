name: Monthly Data Update

on:
  schedule:
    # First day of every month at 02:00 UTC
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      skip_github_enrichment:
        description: "Skip GitHub enrichment (faster dry run)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    name: Refresh Atlas Dataset
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run monthly update
        env:
          GITHUB_TOKEN: ${{ secrets.ATLAS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          SKIP_GITHUB_ENRICHMENT: ${{ inputs.skip_github_enrichment || 'false' }}
        run: npm run ingest

      - name: Validate updated dataset
        run: npm run validate:data

      - name: Commit updated data
        run: |
          git config user.name  "atlas-bot[bot]"
          git config user.email "atlas-bot[bot]@users.noreply.github.com"
          git add data/processed/ public/api/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): monthly update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload dataset artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: atlas-dataset-${{ github.run_id }}
          path: |
            data/processed/atlas.json
            public/api/
          retention-days: 90
